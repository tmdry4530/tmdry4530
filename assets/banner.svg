    <text x="600" y="162" font-size="16.5" font-weight="500" fill="#8B949E" letter-spacing="0.6">agent-assisted builder<tspan fill="#39414F">&#160;&#160;&#183;&#160;&#160;</tspan>operator systems<tspan fill="#39414F">&#160;&#160;&#183;&#160;&#160;</tspan>crypto cockpits</text>
